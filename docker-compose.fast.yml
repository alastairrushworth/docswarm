# Overlay for `make run-local-fast`: replaces the real Ollama image with a
# canned-response stub so the full docker stack (translator, judge, agent,
# inbox/feedback file protocol) can be exercised end-to-end in <60s.
services:
  ollama-main:
    image: docswarm-stub-ollama:local
    build:
      context: .
      dockerfile: docker/stub-ollama.Dockerfile
    pull_policy: never
    environment: []
    volumes: []

  developer-agent:
    environment:
      - DOCSWARM_MODE=local
      - DOCSWARM_FAST=1

  judge:
    environment:
      - DOCSWARM_MODE=local
